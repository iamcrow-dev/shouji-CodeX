<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关闭 CodeX 桌面端</title>
    <link rel="stylesheet" href="./close-confirm.css" />
  </head>
  <body>
    <main class="dialog-shell">
      <p class="eyebrow">关闭窗口</p>
      <p class="copy">最小化到托盘后，Host 服务会继续在后台运行；完全退出会关闭整个程序。</p>
      <div class="button-row">
        <button id="minimize-to-tray-button" class="secondary" type="button">最小化到托盘</button>
        <button id="quit-app-button" class="primary" type="button">完全退出</button>
      </div>
    </main>
    <script type="module" src="./close-confirm.js"></script>
  </body>
</html>
